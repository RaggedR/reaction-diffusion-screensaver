<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Random Penrose Tiling</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0a; overflow: hidden; cursor: none; }
    canvas { display: block; position: absolute; top: 0; left: 0; }
    #back { z-index: 0; }
    #front { z-index: 1; transition: opacity 0.8s ease-in-out; }
    #info {
      position: fixed; bottom: 12px; left: 0; right: 0;
      text-align: center; color: rgba(255,255,255,0.25);
      font: 300 12px system-ui, sans-serif;
      pointer-events: none; z-index: 2;
    }
  </style>
</head>
<body>
  <canvas id="back"></canvas>
  <canvas id="front"></canvas>
  <div id="info"></div>
  <script>
  (() => {
    const frontCanvas = document.getElementById('front');
    const backCanvas = document.getElementById('back');
    const frontCtx = frontCanvas.getContext('2d');
    const backCtx = backCanvas.getContext('2d');

    const CYCLE_INTERVAL = 4000;
    const FADE_DURATION = 800;
    let cycleTimer = null;
    let showOutlines = true;

    // ─── Palettes (thick = fat rhombus, thin = skinny rhombus) ──
    const palettes = [
      { bg: '#1c1410',  thick: '#b8935a', thickEdge: '#6b4f2a', thin: '#6b4c35', thinEdge: '#3d2518' },
      { bg: '#0a1520',  thick: '#2e7d9b', thickEdge: '#134050', thin: '#1b4f6b', thinEdge: '#092530' },
      { bg: '#101510',  thick: '#6a8a5a', thickEdge: '#3a5530', thin: '#8a7a6a', thinEdge: '#504038' },
      { bg: '#1a1010',  thick: '#c47030', thickEdge: '#803818', thin: '#802848', thinEdge: '#481028' },
      { bg: '#080c18',  thick: '#c8a840', thickEdge: '#806818', thin: '#283858', thinEdge: '#121e30' },
      { bg: '#0a0a0a',  thick: '#606060', thickEdge: '#303030', thin: '#383838', thinEdge: '#181818' },
      { bg: '#141010',  thick: '#b06848', thickEdge: '#703820', thin: '#d4a878', thinEdge: '#907040' },
      { bg: '#0c1018',  thick: '#a0b8d0', thickEdge: '#5878a0', thin: '#607890', thinEdge: '#304050' },
    ];

    // ─── De Bruijn pentagrid → Penrose P3 (rhombus) tiling ─────
    //
    // Five families of parallel lines at 72° intervals, with random
    // offsets γ_k. Each intersection of two families dualises to a
    // rhombus tile. The offsets must satisfy Σγ ∉ ℤ (no triple
    // intersections). Different offsets → genuinely different tilings.

    function renderTiling(cvs, ctx) {
      const dpr = window.devicePixelRatio || 1;
      const w = window.innerWidth, h = window.innerHeight;
      cvs.width = w * dpr;
      cvs.height = h * dpr;
      cvs.style.width = w + 'px';
      cvs.style.height = h + 'px';
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

      const pal = palettes[Math.floor(Math.random() * palettes.length)];
      ctx.fillStyle = pal.bg;
      ctx.fillRect(0, 0, w, h);

      // Tile side length in pixels + random global rotation
      const sz = 20 + Math.random() * 25;
      const rot = Math.random() * 2 * Math.PI;
      const cx = w / 2, cy = h / 2;

      // Five direction vectors (unit, rotated)
      const e = [];
      for (let k = 0; k < 5; k++) {
        const a = 2 * Math.PI * k / 5 + rot;
        e.push([Math.cos(a), Math.sin(a)]);
      }

      // Random grid offsets — the source of genuine randomness
      const gamma = [];
      for (let k = 0; k < 5; k++) gamma.push(Math.random());
      // Enforce genericity: Σγ must not be near an integer
      const gsum = gamma.reduce((a, b) => a + b);
      if (Math.abs(gsum - Math.round(gsum)) < 0.1) gamma[0] += 0.2;

      // Index range: dual vertices are ~2.5× further than grid intersections
      const R = Math.hypot(w, h) / 2;
      const maxN = Math.ceil(R / sz) + 5;

      const margin = sz * 3;
      let count = 0;

      for (let j = 0; j < 5; j++) {
        for (let k = j + 1; k < 5; k++) {
          // 2×2 system determinant
          const det = e[j][0] * e[k][1] - e[k][0] * e[j][1];
          if (Math.abs(det) < 1e-10) continue;

          // Tile type: thick (72°) for |j-k| ∈ {1,4}, thin (36°) for {2,3}
          const diff = k - j;
          const isThick = (diff === 1 || diff === 4);

          for (let nj = -maxN; nj <= maxN; nj++) {
            for (let nk = -maxN; nk <= maxN; nk++) {
              // Solve for intersection point of line nj (family j) and nk (family k)
              const rj = nj - gamma[j];
              const rk = nk - gamma[k];
              const px = sz * (rj * e[k][1] - rk * e[j][1]) / det;
              const py = sz * (rk * e[j][0] - rj * e[k][0]) / det;

              // Cell indices for the other three families at this point
              const I = new Array(5);
              I[j] = nj;
              I[k] = nk;
              for (let l = 0; l < 5; l++) {
                if (l === j || l === k) continue;
                I[l] = Math.floor((e[l][0] * px + e[l][1] * py) / sz + gamma[l]);
              }

              // Dual vertex: V = sz × Σ I_l × e_l, offset to viewport center
              let vx = 0, vy = 0;
              for (let l = 0; l < 5; l++) {
                vx += I[l] * e[l][0];
                vy += I[l] * e[l][1];
              }
              vx = vx * sz + cx;
              vy = vy * sz + cy;

              // Four rhombus vertices (parallelogram: base, +e_j, +e_j+e_k, +e_k)
              const ejx = sz * e[j][0], ejy = sz * e[j][1];
              const ekx = sz * e[k][0], eky = sz * e[k][1];

              const v0x = vx,             v0y = vy;
              const v1x = vx + ejx,       v1y = vy + ejy;
              const v2x = vx + ejx + ekx, v2y = vy + ejy + eky;
              const v3x = vx + ekx,       v3y = vy + eky;

              // Clip: skip if entirely outside viewport
              const minX = Math.min(v0x, v1x, v2x, v3x);
              const maxX = Math.max(v0x, v1x, v2x, v3x);
              const minY = Math.min(v0y, v1y, v2y, v3y);
              const maxY = Math.max(v0y, v1y, v2y, v3y);
              if (maxX < -margin || minX > w + margin || maxY < -margin || minY > h + margin) continue;

              // Draw rhombus
              ctx.beginPath();
              ctx.moveTo(v0x, v0y);
              ctx.lineTo(v1x, v1y);
              ctx.lineTo(v2x, v2y);
              ctx.lineTo(v3x, v3y);
              ctx.closePath();

              ctx.fillStyle = isThick ? pal.thick : pal.thin;
              ctx.fill();

              if (showOutlines) {
                ctx.strokeStyle = isThick ? pal.thickEdge : pal.thinEdge;
                ctx.lineWidth = 0.5;
                ctx.stroke();
              }

              count++;
            }
          }
        }
      }

      return { count };
    }

    // ─── Crossfade cycle ────────────────────────────────

    function cycle() {
      const info = renderTiling(backCanvas, backCtx);
      frontCanvas.style.opacity = '0';

      setTimeout(() => {
        frontCanvas.width = backCanvas.width;
        frontCanvas.height = backCanvas.height;
        frontCanvas.style.width = backCanvas.style.width;
        frontCanvas.style.height = backCanvas.style.height;
        frontCtx.drawImage(backCanvas, 0, 0);
        frontCanvas.style.opacity = '1';

        document.getElementById('info').textContent =
          `${info.count} rhombi · de Bruijn pentagrid`;
      }, FADE_DURATION + 50);
    }

    function startCycle() {
      if (cycleTimer) clearInterval(cycleTimer);
      cycleTimer = setInterval(cycle, CYCLE_INTERVAL);
    }

    // ─── Interaction ─────────────────────────────────────

    let cursorTimer = null;
    document.addEventListener('mousemove', () => {
      document.body.style.cursor = 'pointer';
      if (cursorTimer) clearTimeout(cursorTimer);
      cursorTimer = setTimeout(() => { document.body.style.cursor = 'none'; }, 2000);
    });

    frontCanvas.addEventListener('click', () => { cycle(); startCycle(); });

    document.addEventListener('keydown', e => {
      if (e.key === ' ') {
        e.preventDefault();
        showOutlines = !showOutlines;
        renderTiling(frontCanvas, frontCtx);
      } else if (e.key === 'Enter') {
        cycle(); startCycle();
      } else if (e.key === 'Escape') {
        if (cycleTimer) { clearInterval(cycleTimer); cycleTimer = null; }
      }
    });

    window.addEventListener('resize', () => renderTiling(frontCanvas, frontCtx));

    renderTiling(frontCanvas, frontCtx);
    frontCanvas.style.opacity = '1';
    startCycle();
  })();
  </script>
</body>
</html>
