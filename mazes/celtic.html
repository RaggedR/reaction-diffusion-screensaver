<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Knot Maze — Tile View</title>
<style>
  * { margin: 0; padding: 0; }
  body {
    background: #e8e4de;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 16px;
    font-family: Georgia, serif;
  }
  canvas { cursor: pointer; background: #fff; }
  .controls { margin-top: 10px; display: flex; gap: 10px; align-items: center; }
  button, select {
    background: #fff; border: 1px solid #bbb; padding: 4px 12px;
    font-family: inherit; font-size: 0.85em; cursor: pointer;
  }
  button:hover { background: #eee; }
  label { font-size: 0.85em; color: #888; }
  .info { font-size: 0.75em; color: #999; margin-top: 6px; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="controls">
  <button id="btnNew">New maze</button>
  <select id="selSize">
    <option value="6">6</option>
    <option value="8">8</option>
    <option value="10" selected>10</option>
    <option value="14">14</option>
    <option value="18">18</option>
  </select>
  <select id="selBridge">
    <option value="0.08">Few crossings</option>
    <option value="0.2" selected>Some crossings</option>
    <option value="0.4">Many crossings</option>
  </select>
  <label><input type="checkbox" id="chkGrid" checked> Grid</label>
  <label><input type="checkbox" id="chkLabels" checked> Labels</label>
  <label><input type="checkbox" id="chkSolve"> Solution</label>
</div>
<div class="info" id="info"></div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

const BG = '#fff';
const OL = '#333';
const FL = '#e8e5e0';
const GRID_CLR = '#ddd';

let N, CELL, TUBE, OLW, PAD;

function setup(n) {
  N = n;
  CELL = Math.max(36, Math.floor(680 / N));
  TUBE = Math.max(5, Math.round(CELL * 0.30));
  OLW = Math.max(1.5, TUBE * 0.22);
  PAD = Math.round(CELL * 0.4);
  canvas.width = canvas.height = N * CELL + PAD * 2;
}

function px(c) { return PAD + c * CELL + CELL / 2; }
function py(r) { return PAD + r * CELL + CELL / 2; }
function key(r,c) { return r*N+c; }
function rc(k) { return [Math.floor(k/N), k%N]; }

// Port: midpoint of cell edge in direction d
function port(r, c, d) {
  const x = px(c), y = py(r), h = CELL/2;
  if (d==='N') return [x, y-h];
  if (d==='S') return [x, y+h];
  if (d==='E') return [x+h, y];
  return [x-h, y];
}

// ============ 18 TILE TYPES ============
// Each tile type: { name, dirs (sorted string), render(r,c) }
// Crossing tiles have TWO layers (under + over)

const TILE_NAMES = {
  '':     'empty',
  'N':    'dead N',  'S': 'dead S',  'E': 'dead E',  'W': 'dead W',
  'NS':   'vert',    'EW': 'horiz',
  'EN':   'NE',      'NW': 'NW',     'ES': 'SE',     'SW': 'SW',
  'ENS':  'T:NSE',   'NSW': 'T:NSW', 'ENW': 'T:NEW', 'ESW': 'T:SEW',
  'ENSW': '+',
  'X:HoverV': 'H/V', 'X:VoverH': 'V/H',
};

// ============ GRAPH + TREE ============

function buildGraph() {
  const edges = [];
  for (let r=0;r<N;r++) for (let c=0;c<N;c++) {
    if (c+1<N) edges.push({a:key(r,c),b:key(r,c+1),t:'r'});
    if (r+1<N) edges.push({a:key(r,c),b:key(r+1,c),t:'r'});
    if (c+2<N) edges.push({a:key(r,c),b:key(r,c+2),t:'b',mid:key(r,c+1),bd:'H'});
    if (r+2<N) edges.push({a:key(r,c),b:key(r+2,c),t:'b',mid:key(r+1,c),bd:'V'});
  }
  return edges;
}

function genTree(edges,bp) {
  const arr=edges.map(e=>({...e,w:Math.random()*(e.t==='b'?1/bp:1)}));
  arr.sort((a,b)=>a.w-b.w);
  const par=new Int32Array(N*N),rnk=new Uint8Array(N*N);
  for(let i=0;i<N*N;i++)par[i]=i;
  function find(x){while(par[x]!==x){par[x]=par[par[x]];x=par[x];}return x;}
  function union(x,y){let a=find(x),b=find(y);if(a===b)return false;if(rnk[a]<rnk[b])[a,b]=[b,a];par[b]=a;if(rnk[a]===rnk[b])rnk[a]++;return true;}
  const tree=[];
  for(const e of arr)if(union(e.a,e.b))tree.push(e);
  return tree;
}

// ============ CLASSIFY EACH CELL ============

function classifyCells(tree) {
  // Regular directions per cell
  const dirs = Array.from({length:N*N},()=>new Set());
  for (const e of tree) {
    if (e.t!=='r') continue;
    const [r1,c1]=rc(e.a),[r2,c2]=rc(e.b);
    if(r2<r1){dirs[e.a].add('N');dirs[e.b].add('S');}
    if(r2>r1){dirs[e.a].add('S');dirs[e.b].add('N');}
    if(c2>c1){dirs[e.a].add('E');dirs[e.b].add('W');}
    if(c2<c1){dirs[e.a].add('W');dirs[e.b].add('E');}
  }

  // Find crossing midpoints
  const regSet = new Set();
  for (const e of tree) if(e.t==='r'){regSet.add(`${e.a}-${e.b}`);regSet.add(`${e.b}-${e.a}`);}

  const crossingAt = {}; // cell index -> { bd: 'H'|'V', bridge: edge }
  for (const e of tree) {
    if (e.t!=='b') continue;
    const [mr,mc]=rc(e.mid);
    let crosses=false;
    if(e.bd==='H'){
      if(mr>0&&regSet.has(`${e.mid}-${key(mr-1,mc)}`))crosses=true;
      if(mr<N-1&&regSet.has(`${e.mid}-${key(mr+1,mc)}`))crosses=true;
    } else {
      if(mc>0&&regSet.has(`${e.mid}-${key(mr,mc-1)}`))crosses=true;
      if(mc<N-1&&regSet.has(`${e.mid}-${key(mr,mc+1)}`))crosses=true;
    }
    if(crosses) crossingAt[e.mid] = { bd: e.bd, bridge: e };
  }

  // Build tile info per cell
  const tiles = [];
  for (let i=0;i<N*N;i++) {
    const d = [...dirs[i]].sort().join('');
    const cr = crossingAt[i];
    let type, name;
    if (cr) {
      // Crossing tile: bridge direction is on top
      type = cr.bd === 'H' ? 'X:HoverV' : 'X:VoverH';
      name = TILE_NAMES[type];
    } else {
      type = d;
      name = TILE_NAMES[d] || '?';
    }
    tiles.push({ cell: i, type, name, dirs: dirs[i], crossing: cr || null });
  }

  // Also track bridge edges for rendering
  const bridges = tree.filter(e=>e.t==='b');

  return { tiles, dirs, bridges, crossingAt };
}

// ============ TILE DRAWING ============

function strokeLine(x1,y1,x2,y2,color,width) {
  ctx.lineCap='round'; ctx.strokeStyle=color; ctx.lineWidth=width;
  ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
}

function strokeCurve(x1,y1,cpx,cpy,x2,y2,color,width) {
  ctx.lineCap='round'; ctx.strokeStyle=color; ctx.lineWidth=width;
  ctx.beginPath(); ctx.moveTo(x1,y1); ctx.quadraticCurveTo(cpx,cpy,x2,y2); ctx.stroke();
}

function drawDot(x,y) {
  ctx.fillStyle=OL; ctx.beginPath(); ctx.arc(x,y,TUBE/2+OLW,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=FL; ctx.beginPath(); ctx.arc(x,y,TUBE/2,0,Math.PI*2); ctx.fill();
}

// Compute path segments for a cell (non-crossing)
function tileSegs(r, c, ds) {
  const x=px(c), y=py(r);
  const d = [...ds].sort();
  const segs = [];

  if (d.length===0) return segs;

  if (d.length===1) {
    const p=port(r,c,d[0]);
    segs.push({L:[p[0],p[1],x,y]});
    return segs;
  }

  if (d.length===2) {
    const a=port(r,c,d[0]), b=port(r,c,d[1]);
    const opp=(d[0]==='E'&&d[1]==='W')||(d[0]==='N'&&d[1]==='S');
    if(opp) segs.push({L:[a[0],a[1],b[0],b[1]]});
    else segs.push({C:[a[0],a[1],x,y,b[0],b[1]]});
    return segs;
  }

  // 3-4 dirs: opposite pairs straight, rest curve or stub
  const has=dd=>d.includes(dd);
  const drawn=new Set();
  if(has('N')&&has('S')){
    const a=port(r,c,'N'),b=port(r,c,'S');
    segs.push({L:[a[0],a[1],b[0],b[1]]});drawn.add('N');drawn.add('S');
  }
  if(has('E')&&has('W')){
    const a=port(r,c,'E'),b=port(r,c,'W');
    segs.push({L:[a[0],a[1],b[0],b[1]]});drawn.add('E');drawn.add('W');
  }
  const rest=d.filter(dd=>!drawn.has(dd));
  if(rest.length>=2){
    const a=port(r,c,rest[0]),b=port(r,c,rest[1]);
    segs.push({C:[a[0],a[1],x,y,b[0],b[1]]});
  } else {
    for(const dd of rest){const p=port(r,c,dd);segs.push({L:[x,y,p[0],p[1]]});}
  }
  return segs;
}

function strokeSegs(segs, color, width) {
  ctx.lineCap='round'; ctx.lineJoin='round'; ctx.strokeStyle=color; ctx.lineWidth=width;
  for(const s of segs){
    ctx.beginPath();
    if(s.L){ctx.moveTo(s.L[0],s.L[1]);ctx.lineTo(s.L[2],s.L[3]);}
    else{ctx.moveTo(s.C[0],s.C[1]);ctx.quadraticCurveTo(s.C[2],s.C[3],s.C[4],s.C[5]);}
    ctx.stroke();
  }
}

// ============ MAIN RENDER ============

function render(tree) {
  ctx.fillStyle = BG;
  ctx.fillRect(0,0,canvas.width,canvas.height);

  const { tiles, dirs, bridges, crossingAt } = classifyCells(tree);
  const showGrid = document.getElementById('chkGrid').checked;
  const showLabels = document.getElementById('chkLabels').checked;
  const moatW = TUBE + OLW*2 + TUBE*0.9;

  // Draw grid lines
  if (showGrid) {
    ctx.strokeStyle = GRID_CLR;
    ctx.lineWidth = 0.5;
    for (let i=0;i<=N;i++) {
      const p = PAD + i * CELL;
      ctx.beginPath(); ctx.moveTo(p, PAD); ctx.lineTo(p, PAD+N*CELL); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(PAD, p); ctx.lineTo(PAD+N*CELL, p); ctx.stroke();
    }
  }

  // ---- Pass 1: Collect all non-crossing tile segments ----
  const allSegs = [];
  for (const t of tiles) {
    if (t.crossing) continue; // crossing cells handled separately
    allSegs.push(...tileSegs(...rc(t.cell), t.dirs));
  }

  // For crossing cells: compute under-path segments
  const crossingUnderSegs = [];
  for (const t of tiles) {
    if (!t.crossing) continue;
    // Under-path = the regular directions (perpendicular to bridge)
    crossingUnderSegs.push(...tileSegs(...rc(t.cell), t.dirs));
  }

  // Draw all non-crossing outlines
  strokeSegs(allSegs, OL, TUBE+OLW*2);
  // Draw crossing under-path outlines
  strokeSegs(crossingUnderSegs, OL, TUBE+OLW*2);

  // Draw all non-crossing fills
  strokeSegs(allSegs, FL, TUBE);
  // Draw crossing under-path fills
  strokeSegs(crossingUnderSegs, FL, TUBE);

  // Dead end dots (non-crossing cells with degree 1)
  for (const t of tiles) {
    if (!t.crossing && t.dirs.size === 1) {
      const [r,c]=rc(t.cell);
      drawDot(px(c),py(r));
    }
  }

  // ---- Pass 2: Crossing tiles — erase gap, draw bridge over ----
  for (const br of bridges) {
    const [r1,c1]=rc(br.a),[r2,c2]=rc(br.b);
    const ax=px(c1),ay=py(r1),bx=px(c2),by=py(r2);

    const cr = crossingAt[br.mid];
    if (cr) {
      const [mr,mc]=rc(br.mid);
      const mx=px(mc),my=py(mr);

      // White moat at crossing
      const dx=(bx-ax)/2, dy=(by-ay)/2;
      ctx.lineCap='round'; ctx.strokeStyle=BG; ctx.lineWidth=moatW;
      ctx.beginPath();
      ctx.moveTo(mx-dx*0.75, my-dy*0.75);
      ctx.lineTo(mx+dx*0.75, my+dy*0.75);
      ctx.stroke();

      // Redraw under-path stubs (stop before moat)
      for (const d of dirs[br.mid]) {
        const perp = (br.bd==='H'&&(d==='N'||d==='S'))||(br.bd==='V'&&(d==='E'||d==='W'));
        if(!perp) continue;
        const p=port(mr,mc,d);
        const ddx=mx-p[0],ddy=my-p[1];
        const len=Math.sqrt(ddx*ddx+ddy*ddy);
        const stop=Math.max(0,1-(moatW/2+2)/len);
        strokeLine(p[0],p[1],p[0]+ddx*stop,p[1]+ddy*stop, OL, TUBE+OLW*2);
        strokeLine(p[0],p[1],p[0]+ddx*stop,p[1]+ddy*stop, FL, TUBE);
      }
    }

    // Bridge tube (always on top)
    strokeLine(ax,ay,bx,by, OL, TUBE+OLW*2);
    strokeLine(ax,ay,bx,by, FL, TUBE);

    // Dead end dots at bridge-only endpoints
    for (const ep of [br.a, br.b]) {
      if (dirs[ep].size===0) {
        const [er,ec]=rc(ep); drawDot(px(ec),py(er));
      }
    }
  }

  // ---- Tile labels ----
  if (showLabels) {
    ctx.font = `${Math.max(7, Math.floor(CELL*0.16))}px monospace`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'bottom';
    ctx.fillStyle = 'rgba(0,0,0,0.25)';
    for (const t of tiles) {
      const [r,c] = rc(t.cell);
      ctx.fillText(t.name, px(c), py(r) + CELL/2 - 2);
    }
  }

  // Solution
  if (document.getElementById('chkSolve').checked) {
    const path = solve(tree);
    if (path.length>1) {
      ctx.strokeStyle='rgba(180,50,40,0.45)'; ctx.lineWidth=2;
      ctx.lineCap='round'; ctx.lineJoin='round'; ctx.setLineDash([3,3]);
      ctx.beginPath();
      const[sr,sc]=rc(path[0]); ctx.moveTo(px(sc),py(sr));
      for(let i=1;i<path.length;i++){const[r,c]=rc(path[i]);ctx.lineTo(px(c),py(r));}
      ctx.stroke(); ctx.setLineDash([]);
    }
  }

  // Stats: count tile types
  const counts = {};
  for (const t of tiles) counts[t.name] = (counts[t.name]||0)+1;
  const summary = Object.entries(counts).sort((a,b)=>b[1]-a[1])
    .map(([k,v])=>`${k}:${v}`).join('  ');
  document.getElementById('info').textContent = `${N}\u00d7${N} \u2014 ${summary}`;
}

function solve(tree) {
  const adj={};for(let i=0;i<N*N;i++)adj[i]=[];
  for(const e of tree){adj[e.a].push(e.b);adj[e.b].push(e.a);}
  const par={0:-1},q=[0];let h=0;
  while(h<q.length){const n=q[h++];if(n===N*N-1){const p=[];let c=N*N-1;while(c!==-1){p.push(c);c=par[c];}return p.reverse();}for(const nb of adj[n])if(!(nb in par)){par[nb]=n;q.push(nb);}}
  return [];
}

// ---- Controls ----
let currentTree;
function regenerate() {
  const n=parseInt(document.getElementById('selSize').value);
  const bp=parseFloat(document.getElementById('selBridge').value);
  setup(n); currentTree=genTree(buildGraph(),bp); render(currentTree);
}
canvas.addEventListener('click', regenerate);
document.getElementById('btnNew').addEventListener('click', regenerate);
document.getElementById('selSize').addEventListener('change', regenerate);
document.getElementById('selBridge').addEventListener('change', regenerate);
document.getElementById('chkGrid').addEventListener('change', ()=>render(currentTree));
document.getElementById('chkLabels').addEventListener('change', ()=>render(currentTree));
document.getElementById('chkSolve').addEventListener('change', ()=>render(currentTree));
regenerate();
</script>
</body>
</html>
