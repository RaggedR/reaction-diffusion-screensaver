<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Penrose Tiling Screensaver</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; cursor: none; }
    canvas { position: absolute; top: 0; left: 0; }
    #back { z-index: 0; }
    #front { z-index: 1; }
  </style>
</head>
<body>
  <canvas id="back"></canvas>
  <canvas id="front"></canvas>
  <script>
  (() => {
    // P2 kite-dart Penrose tiling screensaver.
    // Direct port of jlieberherr/penrose-tilings deflation.
    // Robinson triangles with shape (A=acute, O=obtuse) and
    // side (F=front, B=back). Rotation-based subdivision.

    const frontCanvas = document.getElementById('front');
    const backCanvas = document.getElementById('back');
    const frontCtx = frontCanvas.getContext('2d');
    const backCtx = backCanvas.getContext('2d');

    // ─── Complementary colour palettes ─────────────────────

    const palettes = [
      { // Teal & Coral
        bg: '#080c0c',
        kite: { base: '#3a9090', edge: '#1a4848' },
        dart: { base: '#c06050', edge: '#603028' },
      },
      { // Blue & Orange
        bg: '#08080c',
        kite: { base: '#4070b0', edge: '#1a3058' },
        dart: { base: '#c88030', edge: '#644018' },
      },
      { // Purple & Gold
        bg: '#0a080c',
        kite: { base: '#7050a0', edge: '#382850' },
        dart: { base: '#b8a030', edge: '#5c5018' },
      },
      { // Green & Rose
        bg: '#080c08',
        kite: { base: '#408860', edge: '#204430' },
        dart: { base: '#c06878', edge: '#60343c' },
      },
      { // Indigo & Amber
        bg: '#080810',
        kite: { base: '#4848a0', edge: '#242450' },
        dart: { base: '#d0a040', edge: '#685020' },
      },
      { // Forest & Peach
        bg: '#080a08',
        kite: { base: '#306848', edge: '#183424' },
        dart: { base: '#d89070', edge: '#6c4838' },
      },
      { // Slate & Salmon
        bg: '#0a0a0c',
        kite: { base: '#506878', edge: '#28343c' },
        dart: { base: '#d07060', edge: '#683830' },
      },
      { // Emerald & Magenta
        bg: '#080c0a',
        kite: { base: '#30906a', edge: '#184835' },
        dart: { base: '#b04888', edge: '#582444' },
      },
    ];

    // ─── Geometry ────────────────────────────────────────

    function rot(px, py, ox, oy, deg) {
      const r = deg * Math.PI / 180;
      const c = Math.cos(r), s = Math.sin(r);
      const dx = px - ox, dy = py - oy;
      return [ox + dx * c - dy * s, oy + dx * s + dy * c];
    }

    function tri(shape, side, A, B) {
      const ang = shape === 'A' ? 36 : 108;
      const C = rot(B[0], B[1], A[0], A[1], ang);
      return { shape, side, A, B, C };
    }

    function vkey(v) {
      return `${Math.round(v[0] * 100)},${Math.round(v[1] * 100)}`;
    }

    function ekey(a, b) {
      const ka = vkey(a), kb = vkey(b);
      return ka < kb ? ka + '|' + kb : kb + '|' + ka;
    }

    // ─── P2 Deflation (jlieberherr) ─────────────────────
    //
    // Acute (A) = half-kite (36°-72°-72°), A is 36° apex
    // Obtuse (O) = half-dart (108°-36°-36°), A is 108° apex
    // C = rotate(B, A, 36°) for acute, rotate(B, A, 108°) for obtuse
    //
    // Common side (axis hidden between paired halves):
    //   Front → A-B,  Back → A-C

    function deflate(triangles) {
      const result = [];
      for (const t of triangles) {
        const { shape, side, A, B, C } = t;
        if (shape === 'A') {
          if (side === 'F') {
            const P = rot(B[0], B[1], C[0], C[1], -36);
            const Q = rot(B[0], B[1], C[0], C[1], -72);
            result.push(tri('O', 'F', Q, A));
            result.push(tri('A', 'B', C, Q));
            result.push(tri('A', 'F', C, P));
          } else {
            const P = rot(C[0], C[1], B[0], B[1], 36);
            const Q = rot(C[0], C[1], B[0], B[1], 72);
            result.push(tri('O', 'B', Q, P));
            result.push(tri('A', 'F', B, P));
            result.push(tri('A', 'B', B, C));
          }
        } else {
          if (side === 'F') {
            const D = rot(A[0], A[1], B[0], B[1], -36);
            result.push(tri('A', 'B', B, D));
            result.push(tri('O', 'F', D, C));
          } else {
            const D = rot(A[0], A[1], C[0], C[1], 36);
            result.push(tri('A', 'F', C, A));
            result.push(tri('O', 'B', D, A));
          }
        }
      }
      return result;
    }

    // ─── Sun seed (5 kites around center) ────────────────

    function makeSunSeed(cx, cy, radius) {
      const tris = [];
      for (let i = 0; i < 5; i++) {
        const deg = i * 72 - 90;
        const rad = deg * Math.PI / 180;
        const Bf = [cx + radius * Math.cos(rad), cy + radius * Math.sin(rad)];
        // Front half-kite: A=center, B=Bf, axis=A-B
        tris.push(tri('A', 'F', [cx, cy], Bf));
        // Back half-kite: A=center, B=rotate(Bf, center, -36°), axis=A-C=A-Bf
        const Bb = rot(Bf[0], Bf[1], cx, cy, -36);
        tris.push(tri('A', 'B', [cx, cy], Bb));
      }
      return tris;
    }

    // ─── Full scene render ───────────────────────────────

    function renderScene(cvs, ctx, pal, offsetX, offsetY, depth) {
      const dpr = window.devicePixelRatio || 1;
      const w = window.innerWidth, h = window.innerHeight;
      cvs.width = w * dpr; cvs.height = h * dpr;
      cvs.style.width = w + 'px'; cvs.style.height = h + 'px';
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

      ctx.fillStyle = pal.bg;
      ctx.fillRect(0, 0, w, h);

      const cx = w / 2 + offsetX;
      const cy = h / 2 + offsetY;
      // Radius must reach every screen corner from the offset center
      const radius = Math.max(
        Math.hypot(cx, cy),
        Math.hypot(w - cx, cy),
        Math.hypot(cx, h - cy),
        Math.hypot(w - cx, h - cy),
      ) * 1.05;
      let tris = makeSunSeed(cx, cy, radius);
      for (let d = 0; d < depth; d++) {
        tris = deflate(tris);
      }

      const margin = 60;
      function isVis(t) {
        for (const v of [t.A, t.B, t.C]) {
          if (v[0] > -margin && v[0] < w + margin &&
              v[1] > -margin && v[1] < h + margin) return true;
        }
        return false;
      }

      // Pass 1: flat fill each half-tile
      for (const t of tris) {
        if (!isVis(t)) continue;
        ctx.beginPath();
        ctx.moveTo(t.A[0], t.A[1]);
        ctx.lineTo(t.B[0], t.B[1]);
        ctx.lineTo(t.C[0], t.C[1]);
        ctx.closePath();
        ctx.fillStyle = (t.shape === 'A' ? pal.kite : pal.dart).base;
        ctx.fill();
      }

      // Pass 2: classify edges for tile outlines.
      // Common side (axis): Front → A-B, Back → A-C
      const edgeInfo = {};
      for (const t of tris) {
        if (!isVis(t)) continue;
        const axisEdge = t.side === 'F' ? [t.A, t.B] : [t.A, t.C];
        const axisKey = ekey(axisEdge[0], axisEdge[1]);
        for (const [p, q] of [[t.A, t.B], [t.A, t.C], [t.B, t.C]]) {
          const k = ekey(p, q);
          if (!edgeInfo[k]) edgeInfo[k] = { isAxis: 0, verts: [p, q] };
          if (k === axisKey) edgeInfo[k].isAxis++;
        }
      }

      // Pass 3: draw tile boundary edges only
      ctx.lineWidth = 0.8;
      ctx.strokeStyle = pal.kite.edge;
      ctx.beginPath();
      for (const { isAxis, verts: [p, q] } of Object.values(edgeInfo)) {
        if (isAxis >= 2) continue;
        ctx.moveTo(p[0], p[1]);
        ctx.lineTo(q[0], q[1]);
      }
      ctx.stroke();
    }

    // ─── Screensaver loop ────────────────────────────────

    const SCENE_DURATION = 8000;  // ms per scene
    const FADE_DURATION = 1200;   // ms crossfade

    let scene = null;
    let phase = 'show';  // 'show' | 'fade'
    let phaseStart = 0;
    let showingFront = true;
    function pickScene() {
      const palIdx = Math.floor(Math.random() * palettes.length);
      // Large random offset — each scene shows a different region of the tiling
      const w = window.innerWidth, h = window.innerHeight;
      const spread = Math.max(w, h) * 1.5;
      return {
        pal: palettes[palIdx],
        offsetX: (Math.random() - 0.5) * spread,
        offsetY: (Math.random() - 0.5) * spread,
        depth: 6,
      };
    }

    function startScene() {
      scene = pickScene();
      phase = 'show';
      phaseStart = performance.now();
      renderScene(frontCanvas, frontCtx, scene.pal, scene.offsetX, scene.offsetY, scene.depth);
      frontCanvas.style.opacity = '1';
      showingFront = true;
    }

    function tick(now) {
      const elapsed = now - phaseStart;

      if (phase === 'show') {
        if (elapsed >= SCENE_DURATION) {
          // Start crossfade to next scene
          const nextScene = pickScene();
          const backTarget = showingFront ? backCanvas : frontCanvas;
          const backTargetCtx = showingFront ? backCtx : frontCtx;
          renderScene(backTarget, backTargetCtx, nextScene.pal, nextScene.offsetX, nextScene.offsetY, nextScene.depth);

          if (showingFront) {
            frontCanvas.style.transition = `opacity ${FADE_DURATION}ms ease-in-out`;
            frontCanvas.style.opacity = '0';
            backCanvas.style.transition = 'none';
            backCanvas.style.opacity = '1';
          } else {
            backCanvas.style.transition = `opacity ${FADE_DURATION}ms ease-in-out`;
            backCanvas.style.opacity = '0';
            frontCanvas.style.transition = 'none';
            frontCanvas.style.opacity = '1';
          }
          showingFront = !showingFront;
          scene = nextScene;
          phase = 'fade';
          phaseStart = now;
        }
      } else if (phase === 'fade') {
        if (elapsed >= FADE_DURATION) {
          phase = 'show';
          phaseStart = now;
        }
      }

      requestAnimationFrame(tick);
    }

    // ─── Input ───────────────────────────────────────────

    let cursorTimer = null;
    document.addEventListener('mousemove', () => {
      document.body.style.cursor = 'pointer';
      if (cursorTimer) clearTimeout(cursorTimer);
      cursorTimer = setTimeout(() => { document.body.style.cursor = 'none'; }, 2000);
    });

    function skipToNext() {
      phase = 'show';
      phaseStart = performance.now() - SCENE_DURATION;
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') window.close();
      if (e.key === ' ') { e.preventDefault(); skipToNext(); }
    });
    document.addEventListener('click', skipToNext);

    window.addEventListener('resize', () => {
      if (scene) {
        const target = showingFront ? frontCanvas : backCanvas;
        const targetCtx = showingFront ? frontCtx : backCtx;
        renderScene(target, targetCtx, scene.pal, scene.offsetX, scene.offsetY, scene.depth);
      }
    });

    // ─── Init ────────────────────────────────────────────

    startScene();
    requestAnimationFrame(tick);
  })();
  </script>
</body>
</html>
